services:
  # API REST Service
  biotrust-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biotrust-api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      # Mount data directory para persistência
      - ./data:/app/data
      # Mount logs
      - ./logs:/app/logs
      # Mount source para hot-reload em desenvolvimento
      - ./src:/app/src
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - LOG_LEVEL=info
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-in-production-32-bytes}
      - CORS_ORIGINS=${CORS_ORIGINS:-["https://your-frontend-domain.com"]}
      - CORS_ALLOW_METHODS=${CORS_ALLOW_METHODS:-["GET","POST","PUT","PATCH","DELETE","OPTIONS"]}
      - CORS_ALLOW_HEADERS=${CORS_ALLOW_HEADERS:-["Authorization","Content-Type","X-Requested-With"]}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-["your-api-domain.com"]}
      - SECURITY_HEADERS_ENABLED=True
      - RATE_LIMIT_ENABLED=True
      - RATE_LIMIT_REQUESTS_PER_MINUTE=120
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - biotrust-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit Web Interface (opcional - comentado por padrão)
  # Descomente se quiser rodar Streamlit em Docker também
  # biotrust-web:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.streamlit
  #   container_name: biotrust-web
  #   ports:
  #     - "8501:8501"
  #   volumes:
  #     - ./web/streamlit:/app/web/streamlit
  #   environment:
  #     - API_URL=http://biotrust-api:8000
  #   depends_on:
  #     - biotrust-api
  #   restart: unless-stopped
  #   networks:
  #     - biotrust-network

networks:
  biotrust-network:
    driver: bridge

volumes:
  biotrust-data:
    driver: local
  biotrust-logs:
    driver: local
