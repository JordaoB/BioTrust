<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - BioTrust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mbway-green: #00A859;
            --mbway-dark-green: #005A32;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--mbway-green) 0%, var(--mbway-dark-green) 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header-gradient {
            background: linear-gradient(135deg, var(--mbway-green) 0%, var(--mbway-dark-green) 100%);
            padding: 24px 20px;
            color: white;
        }
        
        .transaction-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.2s;
        }
        
        .transaction-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }
        
        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #e5e7eb;
            background: white;
            color: #6b7280;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: var(--mbway-green);
            color: white;
            border-color: var(--mbway-green);
        }
        
        .back-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .back-button:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header-gradient">
        <div class="flex items-center justify-between mb-6">
            <div class="back-button" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1 class="text-2xl font-bold">Histórico</h1>
            <div style="width: 40px;"></div>
        </div>
        
        <!-- Filters -->
        <div class="flex gap-2 overflow-x-auto" style="scrollbar-width: none; -ms-overflow-style: none;">
            <button class="filter-btn active" onclick="filterTransactions('all')">Todas</button>
            <button class="filter-btn" onclick="filterTransactions('approved')">Aprovadas</button>
            <button class="filter-btn" onclick="filterTransactions('pending')">Pendentes</button>
            <button class="filter-btn" onclick="filterTransactions('rejected')">Rejeitadas</button>
        </div>
    </div>
    
    <!-- Content -->
    <div style="padding: 20px; max-width: 600px; margin: 0 auto;">
        <!-- Stats Summary -->
        <div style="background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px;">
            <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                    <div class="text-2xl font-bold text-gray-800" id="total-count">0</div>
                    <div class="text-xs text-gray-500">Total</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-green-600" id="approved-count">0</div>
                    <div class="text-xs text-gray-500">Aprovadas</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-red-600" id="rejected-count">0</div>
                    <div class="text-xs text-gray-500">Rejeitadas</div>
                </div>
            </div>
        </div>
        
        <!-- Transactions List -->
        <div id="transactions-list">
            <!-- Transactions will be loaded here -->
        </div>
        
        <!-- Empty State -->
        <div id="empty-state" style="display: none; text-align: center; padding: 60px 20px;">
            <svg style="width: 80px; height: 80px; margin: 0 auto 20px; color: #d1d5db;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
            </svg>
            <h3 class="text-xl font-bold text-gray-700 mb-2">Sem transações</h3>
            <p class="text-gray-500">As suas transações aparecerão aqui</p>
        </div>
        
        <!-- Loading -->
        <div id="loading-state" style="text-align: center; padding: 40px;">
            <svg style="width: 60px; height: 60px; color: white; animation: spin 2s linear infinite; margin: 0 auto;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle style="opacity: 0.25;" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path style="opacity: 0.75;" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
    </div>
    
    <script>
        const API_BASE = '';
        let currentUser = null;
        let allTransactions = [];
        let currentFilter = 'all';
        
        // Initialize
        window.addEventListener('DOMContentLoaded', async () => {
            const userData = localStorage.getItem('user');
            if (!userData) {
                window.location.href = '/web';
                return;
            }
            
            currentUser = JSON.parse(userData);
            await loadTransactions();
        });
        
        // Load transactions
        async function loadTransactions() {
            try {
                const response = await fetch(`${API_BASE}/api/users/${currentUser._id}/transactions?limit=100`);
                const data = await response.json();
                
                allTransactions = Array.isArray(data) ? data : (data.transactions || []);
                updateStats();
                displayTransactions(allTransactions);
                
                document.getElementById('loading-state').style.display = 'none';
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('empty-state').style.display = 'block';
            }
        }
        
        // Update stats
        function updateStats() {
            const total = allTransactions.length;
            const approved = allTransactions.filter(tx => tx.status === 'approved').length;
            const rejected = allTransactions.filter(tx => tx.status === 'rejected' || tx.status === 'blocked').length;
            
            document.getElementById('total-count').textContent = total;
            document.getElementById('approved-count').textContent = approved;
            document.getElementById('rejected-count').textContent = rejected;
        }
        
        // Filter transactions
        function filterTransactions(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Filter and display
            let filtered = allTransactions;
            if (filter !== 'all') {
                filtered = allTransactions.filter(tx => tx.status === filter);
            }
            
            displayTransactions(filtered);
        }
        
        // Display transactions
        function displayTransactions(transactions) {
            const list = document.getElementById('transactions-list');
            const emptyState = document.getElementById('empty-state');
            
            if (!transactions || transactions.length === 0) {
                list.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            list.innerHTML = transactions.map(tx => {
                const isExpense = tx.type === 'transfer' || tx.type === 'payment';
                const statusColors = {
                    'approved': 'text-green-600',
                    'pending': 'text-yellow-600',
                    'rejected': 'text-red-600',
                    'blocked': 'text-red-600'
                };
                const statusLabels = {
                    'approved': 'Aprovada',
                    'pending': 'Pendente',
                    'rejected': 'Rejeitada',
                    'blocked': 'Bloqueada'
                };
                
                const date = new Date(tx.timestamp || tx.created_at);
                
                return `
                    <div class="transaction-card fade-in">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-3">
                                <div style="
                                    width: 48px;
                                    height: 48px;
                                    border-radius: 12px;
                                    background: ${isExpense ? '#fee2e2' : '#dcfce7'};
                                    color: ${isExpense ? '#dc2626' : '#16a34a'};
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    font-size: 20px;
                                    font-weight: bold;
                                ">
                                    ${isExpense ? '↑' : '↓'}
                                </div>
                                <div>
                                    <div class="font-semibold text-gray-800">
                                        ${tx.merchant_name || tx.recipient_email || 'Transação'}
                                    </div>
                                    <div class="text-sm text-gray-500">
                                        ${date.toLocaleString('pt-PT', { 
                                            day: '2-digit', 
                                            month: 'short', 
                                            year: 'numeric',
                                            hour: '2-digit', 
                                            minute: '2-digit' 
                                        })}
                                    </div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="font-bold text-lg ${isExpense ? 'text-red-600' : 'text-green-600'}">
                                    ${isExpense ? '-' : '+'}€${parseFloat(tx.amount).toFixed(2)}
                                </div>
                                <div class="${statusColors[tx.status]} text-sm font-semibold">
                                    ${statusLabels[tx.status] || tx.status}
                                </div>
                            </div>
                        </div>
                        
                        ${tx.risk_score ? `
                            <div style="
                                background: #f9fafb;
                                padding: 8px 12px;
                                border-radius: 8px;
                                display: flex;
                                justify-content: space-between;
                                align-items: center;
                            ">
                                <span class="text-sm text-gray-600">Risco</span>
                                <div class="flex items-center gap-2">
                                    <div style="
                                        width: 100px;
                                        height: 6px;
                                        background: #e5e7eb;
                                        border-radius: 3px;
                                        overflow: hidden;
                                    ">
                                        <div style="
                                            width: ${tx.risk_score}%;
                                            height: 100%;
                                            background: ${tx.risk_score > 70 ? '#dc2626' : tx.risk_score > 40 ? '#f59e0b' : '#10b981'};
                                            border-radius: 3px;
                                        "></div>
                                    </div>
                                    <span class="text-sm font-semibold text-gray-700">${tx.risk_score}/100</span>
                                </div>
                            </div>
                        ` : ''}
                        
                        ${tx.liveness_verified ? `
                            <div class="mt-2 text-sm text-green-600 flex items-center gap-2">
                                <i class="fas fa-check-circle"></i>
                                <span>Verificação biométrica completa</span>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
        
        // Go back
        function goBack() {
            window.location.href = '/static/dashboard.html';
        }
    </script>
</body>
</html>
