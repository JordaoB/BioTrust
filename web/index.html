<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioTrust - Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/styles.css?v=10">
    
    <style>
        :root {
            --mbway-green: #00A859;
            --mbway-dark: #005A32;
            --mbway-light: #E8F5E9;
        }
        
        body {
            background: linear-gradient(135deg, #00A859 0%, #005A32 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        .auth-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .btn-mbway {
            background: var(--mbway-green);
            transition: all 0.3s ease;
        }
        
        .btn-mbway:hover {
            background: var(--mbway-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 168, 89, 0.3);
        }
        
        .input-field {
            border: 2px solid #E0E0E0;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: var(--mbway-green);
            box-shadow: 0 0 0 3px rgba(0, 168, 89, 0.1);
        }
        
        .logo-animation {
            animation: fadeInDown 0.6s ease-out;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-animation {
            animation: fadeInUp 0.6s ease-out 0.2s backwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .phone-input-group {
            display: flex;
            gap: 8px;
        }
        
        .country-code-select {
            width: 140px;
            flex-shrink: 0;
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .country-code-select:focus {
            border-color: var(--mbway-green);
            box-shadow: 0 0 0 3px rgba(0, 168, 89, 0.1);
            outline: none;
        }
        
        .phone-number-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .phone-number-input:focus {
            border-color: var(--mbway-green);
            box-shadow: 0 0 0 3px rgba(0, 168, 89, 0.1);
            outline: none;
        }
        
        .country-code-select option {
            padding: 8px;
        }

        @media (max-width: 640px) {
            .auth-card {
                border-radius: 18px;
            }

            .phone-input-group {
                flex-direction: column;
                gap: 10px;
            }

            .country-code-select {
                width: 100%;
            }

            .card-animation {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8 logo-animation">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-full shadow-lg mb-4">
                <i class="fas fa-fingerprint text-4xl" style="color: var(--mbway-green);"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">BioTrust</h1>
            <p class="text-white text-opacity-90">Pagamentos Seguros com Biometria</p>
        </div>
        
        <!-- Auth Card -->
        <div class="auth-card p-8 card-animation">
            <!-- Login Form -->
            <div id="login-form">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Bem-vindo</h2>
                
                <form onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-envelope mr-2"></i>Email
                        </label>
                        <input 
                            type="email" 
                            id="login-email"
                            class="w-full px-4 py-3 rounded-xl input-field focus:outline-none"
                            placeholder="seu@email.com"
                            required
                        >
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <input 
                            type="password" 
                            id="login-password"
                            class="w-full px-4 py-3 rounded-xl input-field focus:outline-none"
                            placeholder="••••••••"
                            required
                        >
                    </div>
                    
                    <button 
                        type="submit"
                        class="w-full btn-mbway text-white py-3 rounded-xl font-semibold mb-4"
                    >
                        Entrar
                    </button>
                </form>
                
                <div class="text-center">
                    <button 
                        onclick="showRegisterForm()"
                        class="text-sm text-gray-600 hover:text-gray-800"
                    >
                        Não tem conta? <span class="font-semibold" style="color: var(--mbway-green);">Criar Conta</span>
                    </button>
                </div>
            </div>
            
            <!-- Register Form (Hidden) -->
            <div id="register-form" class="hidden">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Criar Conta</h2>
                
                <form onsubmit="handleRegister(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-user mr-2"></i>Nome Completo
                        </label>
                        <input 
                            type="text" 
                            id="register-name"
                            class="w-full px-4 py-3 rounded-xl input-field focus:outline-none"
                            placeholder="João Silva"
                            required
                        >
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-envelope mr-2"></i>Email
                        </label>
                        <input 
                            type="email" 
                            id="register-email"
                            class="w-full px-4 py-3 rounded-xl input-field focus:outline-none"
                            placeholder="seu@email.com"
                            required
                        >
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-phone mr-2"></i>Telemóvel
                        </label>
                        <div class="phone-input-group">
                            <select id="register-country-code" class="country-code-select" required>
                                <option value="+351" selected>🇵🇹 +351</option>
                                <option value="+34">🇪🇸 +34</option>
                                <option value="+33">🇫🇷 +33</option>
                                <option value="+44">🇬🇧 +44</option>
                                <option value="+49">🇩🇪 +49</option>
                                <option value="+39">🇮🇹 +39</option>
                                <option value="+32">🇧🇪 +32</option>
                                <option value="+31">🇳🇱 +31</option>
                                <option value="+41">🇨🇭 +41</option>
                                <option value="+43">🇦🇹 +43</option>
                                <option value="+1">🇺🇸 +1</option>
                                <option value="+55">🇧🇷 +55</option>
                                <option value="+244">🇦🇴 +244</option>
                                <option value="+238">🇨🇻 +238</option>
                            </select>
                            <input 
                                type="tel" 
                                id="register-phone"
                                class="phone-number-input"
                                placeholder="912 345 678"
                                required
                                maxlength="15"
                            >
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <input 
                            type="password" 
                            id="register-password"
                            class="w-full px-4 py-3 rounded-xl input-field focus:outline-none"
                            placeholder="Mínimo 6 caracteres"
                            minlength="6"
                            required
                        >
                    </div>
                    
                    <button 
                        type="submit"
                        class="w-full btn-mbway text-white py-3 rounded-xl font-semibold mb-4"
                    >
                        Criar Conta
                    </button>
                </form>
                
                <div class="text-center">
                    <button 
                        onclick="showLoginForm()"
                        class="text-sm text-gray-600 hover:text-gray-800"
                    >
                        Já tem conta? <span class="font-semibold" style="color: var(--mbway-green);">Entrar</span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center mt-6 text-white text-sm text-opacity-80">
            <p>TecStorm '26 Hackathon</p>
            <p class="mt-1">
                <i class="fas fa-shield-alt mr-1"></i>
                Privacy-by-Design: Nenhum dado biométrico é armazenado
            </p>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="/static/js/auth.js?v=1"></script>
</body>
</html>
