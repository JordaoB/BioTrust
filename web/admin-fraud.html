<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioTrust - Fraud Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 20%, #052e16 0%, #020617 45%, #0f172a 100%);
            color: #e5e7eb;
            min-height: 100vh;
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #22c55e;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse 1.6s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            h1 {
                font-size: 1.5rem;
                line-height: 1.2;
            }

            #fraud-feed {
                max-height: 400px;
            }
        }
    </style>
</head>
<body class="p-6 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tight">Fraud Ops Command Center</h1>
                <p class="text-slate-300">Transações em tempo real, scores de risco e falhas de liveness</p>
            </div>
            <div class="flex items-center gap-3 glass rounded-xl px-4 py-2">
                <div class="pulse-dot"></div>
                <span class="text-sm font-semibold">LIVE</span>
                <span id="last-update" class="text-xs text-slate-300"></span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-6" id="kpi-cards"></div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 mb-6">
            <div class="glass rounded-2xl p-4 xl:col-span-2">
                <h2 class="font-bold mb-3">Fluxo de Risco (últimas transações)</h2>
                <canvas id="risk-stream-chart" height="120" aria-label="Gráfico de evolução de risco" role="img"></canvas>
            </div>
            <div class="glass rounded-2xl p-4">
                <h2 class="font-bold mb-3">Distribuição de Status</h2>
                <canvas id="status-chart" height="120" aria-label="Gráfico de distribuição de estados" role="img"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div class="glass rounded-2xl p-4 xl:col-span-2">
                <h2 class="font-bold mb-3">Feed de Fraude em Tempo Real</h2>
                <div id="fraud-feed" class="space-y-3 max-h-[520px] overflow-y-auto"></div>
            </div>
            <div class="glass rounded-2xl p-4">
                <h2 class="font-bold mb-3">Alertas Ativos</h2>
                <div id="alerts" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/token-manager.js"></script>
    <script src="/static/js/admin-fraud.js?v=1"></script>
</body>
</html>
